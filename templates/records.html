{% extends 'base.html' %}
{% block title %}Записи{% endblock %}

{% block content %}
<h2>Все записи</h2>
<a href="/">+ Загрузить ещё</a>

<table border="1" cellpadding="8" cellspacing="0" style="margin-top: 16px; border-collapse: collapse; width: 100%;">
    <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for r in records %}
        <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.name }}</td>
            <td>{{ r.date.strftime('%Y-%m-%d %H:%M') }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
