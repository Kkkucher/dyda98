<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Flask App{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        nav a { margin-left: 16px; text-decoration: none; color: #333; }
        nav a:hover { text-decoration: underline; }
        #clock { font-size: 14px; color: #555; }
        .alert { padding: 10px 14px; margin-bottom: 16px; border-radius: 4px; }
        .alert-danger { background: #fdd; border: 1px solid #f99; }
        .alert-success { background: #dfd; border: 1px solid #9d9; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/">Загрузка</a>
            <a href="/records">Записи</a>
        </div>
        <span id="clock"></span>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script>
        function tick() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU');
        }
        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
